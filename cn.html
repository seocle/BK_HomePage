<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B&amp;K | 女装批发</title>
  <meta name="description" content="B&K 女装批发。可查看新品并通过 KakaoTalk 或 WeChat 咨询。">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="home" data-forced-lang="zh" data-market="cn">
  <div class="mobile-shell">
    <header class="topbar">
      <a class="brand" data-admin-trigger="true" href="./cn.html" aria-label="B&K">
        <img class="brand-logo" src="./Image/Logo/BK_Logo.png" alt="B&amp;K">
      </a>
      <div class="topbar-actions">
        <img class="topbar-logo" src="./Image/Logo/nuzzon.png" alt="Nuzzon">
      </div>
    </header>

    <section class="shortcut-strip">
      <nav class="icon-category-nav" id="home-category-nav">
        <a class="icon-category-link" href="./new-cn.html?filter=new">
          <span class="icon-circle"><img src="./Image/Category/new-category.png" alt=""></span>
          <span data-i18n="navFilter.new">新品</span>
        </a>
        <a class="icon-category-link" href="./new-cn.html?filter=outer">
          <span class="icon-circle"><img src="./Image/Category/outer-category.png" alt=""></span>
          <span data-i18n="navFilter.outer">外套</span>
        </a>
        <a class="icon-category-link" href="./new-cn.html?filter=blouse-shirt">
          <span class="icon-circle"><img src="./Image/Category/blouse-shirt-category.png" alt=""></span>
          <span data-i18n="navFilter.blouseShirt">衬衫/上衣</span>
        </a>
        <a class="icon-category-link" href="./new-cn.html?filter=tshirt">
          <span class="icon-circle"><img src="./Image/Category/tshirt-category.png" alt=""></span>
          <span data-i18n="navFilter.tshirt">T恤</span>
        </a>
      </nav>
    </section>

    <main class="page page-home">
      <section class="hero-card hero-card-promo">
        <a class="hero-promo-image" id="hero-image-link" href="./new-cn.html?filter=new">
          <div id="hero-rotator">
            <img class="hero-slide is-active" id="hero-image-primary" src="" alt="B&K 代表商品图片">
            <img class="hero-slide" id="hero-image-secondary" src="" alt="">
          </div>
        </a>
        <div class="hero-promo-copy">
          <span class="promo-badge" data-i18n="home.promoBadge">NEW ARRIVALS</span>
          <p class="hero-description" data-i18n="home.description">从查看新品到 KakaoTalk、微信咨询，都可以在手机上直接完成。</p>
          <div class="hero-links">
            <a class="button button-dark" href="./new-cn.html?filter=new" data-i18n="home.primary">查看新品</a>
            <a class="button button-light" href="./contact-cn.html" data-i18n="home.secondary">咨询</a>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <p class="section-label" data-i18n="home.categoryLabel">Category</p>
          <h2 data-i18n="home.categoryTitle">主力分类</h2>
        </div>
        <div class="stack-grid">
          <a class="info-card info-card-link" href="./new-cn.html?filter=outer">
            <strong data-i18n="home.category1">外套</strong>
            <p data-i18n="home.category1Text">夹克、外套等反应快的当季款式</p>
          </a>
          <a class="info-card info-card-link" href="./new-cn.html?filter=blouse-shirt">
            <strong data-i18n="home.category2">衬衫/上衣</strong>
            <p data-i18n="home.category2Text">适合单款陈列的衬衫与上衣系列</p>
          </a>
          <a class="info-card info-card-link" href="./new-cn.html?filter=tshirt">
            <strong data-i18n="home.category3">T恤</strong>
            <p data-i18n="home.category3Text">基础款与季节款都适合搭配销售</p>
          </a>
        </div>
      </section>

      <section class="section">
        <div class="section-head compact">
          <div>
            <p class="section-label" data-i18n="home.newLabel">New</p>
            <h2 data-i18n="home.newTitle">本周新品</h2>
          </div>
          <a class="inline-link" href="./new-cn.html?filter=new" data-i18n="home.newMore">查看全部</a>
        </div>
        <div class="product-preview" id="home-preview-list"></div>
      </section>

      <section class="section">
        <div class="contact-banner">
          <p class="section-label" data-i18n="home.contactLabel">Contact</p>
          <h2 data-i18n="home.contactTitle">扫码即可咨询</h2>
          <p data-i18n="home.contactText">韩国客户使用 KakaoTalk，海外买手可直接使用微信联系。</p>
          <a class="button button-dark full" href="./contact-cn.html" data-i18n="home.contactButton">查看二维码</a>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a class="bottom-link is-active" href="./cn.html" data-i18n="nav.home">首页</a>
      <a class="bottom-link" href="./new-cn.html" data-i18n="nav.new">新品</a>
      <a class="bottom-link" href="./store-cn.html" data-i18n="nav.store">店铺</a>
      <a class="bottom-link" href="./contact-cn.html" data-i18n="nav.contact">咨询</a>
    </nav>
  </div>

  <div class="modal" id="product-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-close-modal="true" aria-label="关闭">关闭</button>
      <img id="modal-image" src="" alt="">
      <div class="modal-content">
        <p class="section-label" id="modal-label"></p>
        <h2 id="modal-title"></h2>
        <p class="page-text" id="modal-description"></p>
        <strong class="modal-price" id="modal-price"></strong>
        <p class="modal-count" id="modal-count"></p>
        <div class="modal-actions">
          <button class="button button-light" id="prev-image" type="button" data-i18n="modal.prev">上一张</button>
          <button class="button button-dark" id="next-image" type="button" data-i18n="modal.next">下一张</button>
          <button class="button button-dark full" id="capture-inquiry" type="button">咨询</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
