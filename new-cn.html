<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B&amp;K | 新品</title>
  <meta name="description" content="B&K 女装新品页面">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="new" data-forced-lang="zh" data-market="cn">
  <div class="mobile-shell">
    <header class="topbar">
      <a class="brand" data-admin-trigger="true" href="./cn.html" aria-label="B&K">
        <img class="brand-logo" src="./Image/Logo/BK_Logo.png" alt="B&amp;K">
      </a>
      <div class="topbar-actions">
        <img class="topbar-logo" src="./Image/Logo/nuzzon.png" alt="Nuzzon">
      </div>
    </header>

    <main class="page">
      <section class="page-intro">
        <p class="eyebrow" data-i18n="new.eyebrow">NEW ARRIVALS</p>
        <h1 class="page-title" id="catalog-title" data-i18n="new.title">新品</h1>
        <p class="page-text" id="catalog-description" data-i18n="new.description">点击商品图片即可查看详情。</p>
      </section>

      <nav class="category-nav category-nav-light" id="catalog-category-nav">
        <a class="category-link" href="./new-cn.html?filter=new" data-filter-link="new" data-i18n="navFilter.new">新品</a>
        <a class="category-link" href="./new-cn.html?filter=outer" data-filter-link="outer" data-i18n="navFilter.outer">外套</a>
        <a class="category-link" href="./new-cn.html?filter=blouse-shirt" data-filter-link="blouse-shirt" data-i18n="navFilter.blouseShirt">衬衫/上衣</a>
        <a class="category-link" href="./new-cn.html?filter=tshirt" data-filter-link="tshirt" data-i18n="navFilter.tshirt">T恤</a>
      </nav>

      <section class="product-list" id="product-list"></section>
    </main>

    <nav class="bottom-nav">
      <a class="bottom-link" href="./cn.html" data-i18n="nav.home">首页</a>
      <a class="bottom-link is-active" href="./new-cn.html" data-i18n="nav.new">新品</a>
      <a class="bottom-link" href="./store-cn.html" data-i18n="nav.store">店铺</a>
      <a class="bottom-link" href="./contact-cn.html" data-i18n="nav.contact">咨询</a>
    </nav>
  </div>

  <div class="modal" id="product-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-close-modal="true" aria-label="关闭">关闭</button>
      <img id="modal-image" src="" alt="">
      <div class="modal-content">
        <p class="section-label" id="modal-label"></p>
        <h2 id="modal-title"></h2>
        <p class="page-text" id="modal-description"></p>
        <strong class="modal-price" id="modal-price"></strong>
        <p class="modal-count" id="modal-count"></p>
        <div class="modal-actions">
          <button class="button button-light" id="prev-image" type="button" data-i18n="modal.prev">上一张</button>
          <button class="button button-dark" id="next-image" type="button" data-i18n="modal.next">下一张</button>
          <button class="button button-light" id="save-product-image" type="button">保存图片</button>
          <button class="button button-dark" id="open-product-inquiry" type="button">咨询</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
