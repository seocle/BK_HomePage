<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B&amp;K | 신상품</title>
  <meta name="description" content="B&K 여성의류 신상품 페이지">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="new">
  <div class="mobile-shell">
    <header class="topbar">
      <a class="brand" href="./index.html">B&amp;K</a>
      <div class="topbar-actions">
        <a class="admin-link" href="./admin.html">Admin</a>
        <div class="lang-switch" aria-label="language switch">
          <button class="lang-button is-active" type="button" data-lang="ko">KR</button>
          <button class="lang-button" type="button" data-lang="zh">CN</button>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="page-intro">
        <p class="eyebrow" data-i18n="new.eyebrow">NEW ARRIVALS</p>
        <h1 class="page-title" data-i18n="new.title">신상품</h1>
        <p class="page-text" data-i18n="new.description">상품 이미지를 눌러 상세 컷을 확인할 수 있습니다.</p>
      </section>

      <section class="product-list" id="product-list"></section>
    </main>

    <nav class="bottom-nav">
      <a class="bottom-link" href="./index.html" data-i18n="nav.home">홈</a>
      <a class="bottom-link is-active" href="./new.html" data-i18n="nav.new">신상품</a>
      <a class="bottom-link" href="./store.html" data-i18n="nav.store">매장안내</a>
      <a class="bottom-link" href="./contact.html" data-i18n="nav.contact">문의</a>
    </nav>
  </div>

  <div class="modal" id="product-modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-close-modal="true" aria-label="닫기">닫기</button>
      <img id="modal-image" src="" alt="">
      <div class="modal-content">
        <p class="section-label" id="modal-label"></p>
        <h2 id="modal-title"></h2>
        <p class="page-text" id="modal-description"></p>
        <strong class="modal-price" id="modal-price"></strong>
        <p class="modal-count" id="modal-count"></p>
        <div class="modal-actions">
          <button class="button button-light" id="prev-image" type="button" data-i18n="modal.prev">이전</button>
          <button class="button button-dark" id="next-image" type="button" data-i18n="modal.next">다음</button>
        </div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
